name: Build Windows EXE

on:

  workflow_dispatch:

  push:
    branches:
      - main

jobs:

  build:

    runs-on: windows-latest

    steps:

      # =========================
      # CHECKOUT
      # =========================

      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # PYTHON
      # =========================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # =========================
      # INSTALL DEPENDENCIES
      # =========================

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # =========================
      # INSTALL PLAYWRIGHT
      # =========================

      - name: Install Playwright Browsers
        run: |
          playwright install chromium

      # =========================
      # BUILD RENDERER EXE
      # =========================

      - name: Build Renderer EXE
        shell: cmd
        run: |
          pyinstaller --onefile ^
          --name ficha-renderer ^
          --add-data "template.html;." ^
          --add-data "style.css;." ^
          --add-data "assets;assets" ^
          --add-data "%USERPROFILE%\AppData\Local\ms-playwright;ms-playwright" ^
          app.py

      # =========================
      # BUILD PDF MERGER EXE
      # =========================

      - name: Build PDF Merger EXE
        shell: cmd
        run: |
          pyinstaller --onefile ^
          --name pdf-merger ^
          pdf_merger.py

      # =========================
      # UPLOAD ARTIFACT
      # =========================

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: BIMSA_FichaTecnica_EXE
          path: |
            dist/ficha-renderer.exe
            dist/pdf-merger.exe